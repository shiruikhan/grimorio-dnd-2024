<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebApplication",
  "name": "Grimório D&D 2024",
  "url": "https://shiruikhan.github.io/grimorio-dnd-2024/",
  "description": "Leitor das 390 magias de D&D 2024 (Livro do Jogador) em português: grimório pessoal por classe, filtros, busca e exportação em PDF. Funciona offline e no celular.",
  "applicationCategory": "ReferenceApplication",
  "operatingSystem": "Any",
  "inLanguage": "pt-BR",
  "isAccessibleForFree": true,
  "offers": {
    "@type": "Offer",

<body>
<header class="topbar">
  <div class="brand">
    <span class="logo">✶</span>
    <div>
      <h1>Grimório</h1>
      <span class="sub">Livro do Jogador · D&amp;D 2024</span>
    </div>
  </div>
  <nav class="classes" id="classes"></nav>
  <div class="topactions">
    <input type="search" id="search" placeholder="Buscar magia…" autocomplete="off">
    <a class="gh-link" href="https://github.com/shiruikhan/grimorio-dnd-2024" target="_blank" rel="noopener" title="Ver o código no GitHub" aria-label="Ver no GitHub">
      <svg viewBox="0 0 16 16" width="15" height="15" aria-hidden="true" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
      <span>GitHub</span>
    </a>
  </div>
</header>

<div class="toolbar" id="toolbar">
  <div class="levels" id="levelFilter"></div>
  <div class="filters">
    <select id="schoolFilter"><option value="">Todas as escolas</option></select>
    <label class="chk"><input type="checkbox" id="fRitual"> Ritual</label>
    <label class="chk"><input type="checkbox" id="fConc"> Concentração</label>
    <label class="chk chk-known"><input type="checkbox" id="fKnown"> Só do grimório</label>
    <label class="chk chk-hb"><input type="checkbox" id="fHomebrew"> Homebrew</label>
  </div>
  <div class="grimactions">
    <span class="count" id="knownCount">0 no grimório</span>
    <button id="btnFicha" title="Ficha de personagem simplificada (nível, atributos, magias e espaços)">🧙 Ficha</button>
    <button id="btnPrint" title="Exportar PDF só das magias do grimório (escolha 'Salvar como PDF' no diálogo)">📄 Exportar PDF</button>
    <button id="btnExport" title="Backup do grimório (.json)">⭳ Backup</button>
    <button id="btnImport" title="Restaurar grimório de um backup (.json)">⭱ Restaurar</button>
    <button id="btnClear" class="danger" title="Limpar grimório da classe atual">Limpar</button>
    <input type="file" id="importFile" accept="application/json" hidden>
  </div>
</div>

<main class="layout">
  <section class="list-pane" id="listPane"></section>
  <section class="detail-pane" id="detailPane">
    <div class="empty" id="emptyDetail">
      <span class="logo big">✶</span>
      <p>Selecione uma classe e clique em uma magia para ver os detalhes.</p>
    </div>
  </section>
</main>

<div id="fichaOverlay" class="ficha-overlay" hidden></div>

<script src="data/magias.js"></script>
<script src="data/classes.js"></script>
<script src="js/app.js"></script>
<script src="js/ficha.js"></script>
</body>
</html>
